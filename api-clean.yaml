apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: api
  name: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  strategy: {}
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - image: shopnoltd-api:latest
        name: shopnoltd-api
        ports:
        - containerPort: 8000
        resources: {}
status: {}
