apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: shopnoltd-billing-rules
  namespace: observability
spec:
  groups:
  - name: billing.rules
    rules:
    - alert: BillingEndpointErrorsHigh
      expr: |
        increase(http_server_requests_seconds_count{handler="/billing/webhook",status!~"2.."}[5m]) > 5
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "High number of non-2xx responses on billing webhook"
        description: "The billing webhook endpoint has returned more than 5 non-2xx responses in the last 5 minutes. Investigate payment processing or webhook signature failures."
