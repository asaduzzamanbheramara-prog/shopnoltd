apiVersion: v1
kind: ConfigMap
metadata:
  name: kf-init-scripts
  namespace: toolbox
data:
  wait_for_mongo.bash: |
    #!/bin/bash
    set -e
    HOST="${MONGO_HOST:-mongo}"
    # Note: intentionally NOT reading $MONGO_PORT here -- Kubernetes auto-injects
    # a MONGO_PORT env var for the "mongo" Service (e.g. tcp://10.x.x.x:27017),
    # which collides with and overrides any value we'd want to default to.
    PORT=27017
    echo "Waiting for MongoDB at ${HOST}:${PORT}..."
    for i in $(seq 1 60); do
      if (echo > /dev/tcp/${HOST}/${PORT}) >/dev/null 2>&1; then
        echo "MongoDB is up."
        exit 0
      fi
      sleep 2
    done
    echo "Timed out waiting for MongoDB at ${HOST}:${PORT}."
    exit 1

  wait_for_postgres.bash: |
    #!/bin/bash
    set -e
    # Parses host/port out of DATABASE_URL, e.g. postgres://user:pass@host:5432/db
    DB_HOST=$(echo "$DATABASE_URL" | sed -E 's#.*://[^@]*@([^:/]+).*#\1#')
    DB_PORT=$(echo "$DATABASE_URL" | sed -E 's#.*:([0-9]+)/.*#\1#')
    DB_PORT="${DB_PORT:-5432}"
    echo "Waiting for Postgres at ${DB_HOST}:${DB_PORT}..."
    for i in $(seq 1 60); do
      if (echo > /dev/tcp/${DB_HOST}/${DB_PORT}) >/dev/null 2>&1; then
        echo "Postgres is up."
        exit 0
      fi
      sleep 2
    done
    echo "Timed out waiting for Postgres at ${DB_HOST}:${DB_PORT}."
    exit 1