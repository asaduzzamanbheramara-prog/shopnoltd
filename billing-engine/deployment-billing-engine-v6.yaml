apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-engine
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: billing-engine
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: billing-engine
    spec:
      containers:
      - name: billing-engine
        image: ghcr.io/asaduzzamanbheramara-prog/shopnoltd-billing-engine:v6
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        envFrom:
        - secretRef:
            name: stripe-secret
        - secretRef:
            name: paypal-secret
            optional: true
        - secretRef:
            name: razorpay-secret
            optional: true
        - secretRef:
            name: sslcommerz-secret
            optional: true
        - secretRef:
            name: bkash-secret
            optional: true
        - secretRef:
            name: nagad-secret
            optional: true
        - secretRef:
            name: billing-db-secret
            optional: true
        env:
        - name: BASE_CALLBACK_URL
          value: "https://billing.shopnoltd.dpdns.org"
        - name: OTEL_SERVICE_NAME
          value: billing-engine
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://otel-collector.observability.svc.cluster.local:4318
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: http/protobuf
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "750m"
            memory: "768Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 1
          failureThreshold: 3
          successThreshold: 1
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 1
          failureThreshold: 3
          successThreshold: 1
---
# billing-db-secret should contain: DATABASE_URL=postgresql://user:pass@<your-postgres-service>:5432/billing
# Uses your existing deployment-postgres.yaml database rather than a new one.
# The optional: true secretRefs mean the pod still starts fine even before you've created
# a given gateway's secret -- that gateway just stays in demo mode until you do.
