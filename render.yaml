services:
  - type: web
    name: shopnoltd-backend
    env: docker
    plan: starter  # change to 'standard' if needed
    dockerfilePath: backend/Dockerfile
    autoDeploy: true
    branch: main
    envVars:
      - key: APP_NAME
        fromFile: backend/.env
      - key: APP_ENV
        fromFile: backend/.env
      - key: APP_KEY
        fromFile: backend/.env
      - key: APP_DEBUG
        fromFile: backend/.env
      - key: APP_URL
        fromFile: backend/.env
      - key: DB_CONNECTION
        fromFile: backend/.env
      - key: DB_HOST
        fromFile: backend/.env
      - key: DB_PORT
        fromFile: backend/.env
      - key: DB_DATABASE
        fromFile: backend/.env
      - key: DB_USERNAME
        fromFile: backend/.env
      - key: DB_PASSWORD
        fromFile: backend/.env
      - key: BROADCAST_DRIVER
        fromFile: backend/.env
      - key: CACHE_DRIVER
        fromFile: backend/.env
      - key: QUEUE_CONNECTION
        fromFile: backend/.env
      - key: SESSION_DRIVER
        fromFile: backend/.env
      - key: SESSION_LIFETIME
        fromFile: backend/.env
      - key: MAIL_MAILER
        fromFile: backend/.env
      - key: MAIL_HOST
        fromFile: backend/.env
      - key: MAIL_PORT
        fromFile: backend/.env
      - key: MAIL_USERNAME
        fromFile: backend/.env
      - key: MAIL_PASSWORD
        fromFile: backend/.env
      - key: MAIL_ENCRYPTION
        fromFile: backend/.env
      - key: MAIL_FROM_ADDRESS
        fromFile: backend/.env
      - key: MAIL_FROM_NAME
        fromFile: backend/.env
    healthCheckPath: /health
    mounts:
      - type: volume
        name: shopnoltd-backend-storage
        mountPath: /var/www/html/storage

  - type: web
    name: shopnoltd-frontend
    env: docker
    plan: starter
    dockerfilePath: Dockerfile.frontend
    autoDeploy: true
    branch: main
    envVars:
      - key: REACT_APP_API_URL
        value: "https://shopnoltd-backend.onrender.com/api"
    healthCheckPath: /

databases:
  - name: shopnoltd-db
    engine: postgres
    plan: starter
