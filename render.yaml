services:
  # ==========================
  # Backend Service
  # ==========================
  - type: web
    name: shopnoltd-backend
    env: docker
    plan: starter
    dockerfilePath: backend/Dockerfile
    autoDeploy: true
    branch: main
    envVars:
      - key: APP_NAME
        value: ShopNoLtd
      - key: APP_ENV
        value: production
      - key: APP_KEY
        value: ""
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://shopnoltd.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        value: db
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        value: shopnoltd_db
      - key: DB_USERNAME
        value: shopnouser
      - key: DB_PASSWORD
        value: Asad18081978#
      - key: BROADCAST_DRIVER
        value: log
      - key: CACHE_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: SESSION_DRIVER
        value: file
      - key: SESSION_LIFETIME
        value: "120"
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp.mailtrap.io
      - key: MAIL_PORT
        value: "2525"
      - key: MAIL_USERNAME
        value: null
      - key: MAIL_PASSWORD
        value: null
      - key: MAIL_ENCRYPTION
        value: null
      - key: MAIL_FROM_ADDRESS
        value: shopnoltd@example.com
      - key: MAIL_FROM_NAME
        value: ShopNoLtd
    healthCheckPath: /health
    mounts:
      - type: volume
        name: shopnoltd-backend-storage
        mountPath: /var/www/html/storage

  # ==========================
  # Frontend Service
  # ==========================
  - type: web
    name: shopnoltd-frontend
    env: docker
    plan: starter
    dockerfilePath: Dockerfile.frontend
    autoDeploy: true
    branch: main
    envVars:
      - key: REACT_APP_API_URL
        value: "https://shopnoltd-backend.onrender.com/api"
    healthCheckPath: /

# ==========================
# Database Service
# ==========================
databases:
  - name: shopnoltd-db
    engine: postgres
    plan: starter
    user: shopnouser
    password: Asad18081978#
    database: shopnoltd_db
