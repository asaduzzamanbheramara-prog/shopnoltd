services:
  - type: web
    name: shopnoltd-backend
    env: docker
    plan: starter
    dockerfilePath: Dockerfile
    autoDeploy: true
    buildCommand: ""
    startCommand: ""
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://shopnoltd.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        value: db
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        value: shopnoltd_db
      - key: DB_USERNAME
        value: shopnouser
      - key: DB_PASSWORD
        value: Asad18081978#
  - type: web
    name: shopnoltd-frontend
    env: docker
    plan: starter
    dockerfilePath: Dockerfile.frontend
    autoDeploy: true
