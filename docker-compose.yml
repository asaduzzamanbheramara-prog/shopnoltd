version: "3.9"

services:
  # ===========================
  # PostgreSQL Database
  # ===========================
  db:
    image: postgres:15
    container_name: shopnoltd_db
    restart: always
    environment:
      POSTGRES_DB: shopnoltd_db
      POSTGRES_USER: shopnouser
      POSTGRES_PASSWORD: Asad18081978#
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # ===========================
  # Laravel App (PHP-FPM + Nginx + Supervisor)
  # ===========================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopnoltd_app
    restart: always
    ports:
      - "80:80"
    depends_on:
      - db
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: https://shopnoltd.onrender.com
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: shopnoltd_db
      DB_USERNAME: shopnouser
      DB_PASSWORD: Asad18081978#
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx:/etc/nginx
      - ./docker/supervisord.conf:/etc/supervisord.conf
      - ./backend/storage:/var/www/html/storage

volumes:
  db_data:
