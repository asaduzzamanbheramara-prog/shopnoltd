version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopnoltd_backend
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: false

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: shopnoltd_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
