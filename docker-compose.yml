version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopnoltd_backend
    ports:
      - "8000:80"  # Expose backend on localhost:8000
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_KEY: base64:YOUR_APP_KEY_HERE
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: shopnoltd_db
      DB_USERNAME: shopnoltd_user
      DB_PASSWORD: Asad18081978#
    volumes:
      - ./backend:/app
      - ./backend/vendor:/app/vendor
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: shopnoltd_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: shopnoltd_db
      MYSQL_USER: shopnoltd_user
      MYSQL_PASSWORD: Asad18081978#
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: shopnoltd_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

volumes:
  db_data:
