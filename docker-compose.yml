version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopnoltd_backend
    restart: unless-stopped
    ports:
      - "8080:80"       # Map container port 80 to host 8080
    volumes:
      - ./backend/public:/var/www/html/public
      - ./backend/storage:/var/www/html/storage
      - ./backend/.env:/var/www/html/.env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    networks:
      - shopnoltd_network

networks:
  shopnoltd_network:
    driver: bridge
