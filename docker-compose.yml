version: "3.8"
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: shopnoltd_app:latest
    container_name: shopnoltd_app
    restart: unless-stopped
    volumes:
      - ./:/var/www/html:cached
    env_file:
      - ./.env
    depends_on:
      - db
    networks:
      - shopnet

  nginx:
    image: nginx:stable-alpine
    container_name: shopnoltd_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - shopnet

  db:
    image: postgres:15-alpine
    container_name: shopnoltd_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-shopnoltd_db}
      POSTGRES_USER: ${DB_USERNAME:-shopnouser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Asad18081978#}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - shopnet

volumes:
  db_data:

networks:
  shopnet:
    driver: bridge
