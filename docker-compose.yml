version: "3.9"

# Shopno Ltd — core platform compose
# This wires up the services that already have real code in platform/*.
# Services that only contain a Dockerfile stub (e.g. api-service, tenant-router)
# are intentionally left out until they have real app code — see README.

services:

  # ---------- shared infra ----------
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: shopno
      POSTGRES_USER: shopno
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopno"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-shopno}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme123}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # console
    volumes:
      - miniodata:/data

  # ---------- core services (real code in platform/) ----------
  gateway:
    build: ./platform/gateway
    restart: unless-stopped
    env_file: [.env]
    ports:
      - "8000:8000"
    depends_on: [postgres, redis]

  auth-service:
    build: ./platform/auth-service
    restart: unless-stopped
    env_file: [.env]
    ports:
      - "8081:8080"
    depends_on: [postgres, redis]

  oauth-service:
    build: ./platform/oauth-service
    restart: unless-stopped
    env_file: [.env]
    ports:
      - "3001:3000"
    depends_on: [postgres, redis]

  domain-service:
    build: ./platform/domain-service
    restart: unless-stopped
    env_file: [.env]
    ports:
      - "8082:8080"
    depends_on: [postgres, redis]
    # NOTE: also needs a PowerDNS instance reachable via POWERDNS_API_URL — not
    # included here yet, see README "Known gaps".

  payment-service:
    build: ./platform/payment-service
    restart: unless-stopped
    env_file: [.env]
    ports:
      - "8083:8080"
    depends_on: [postgres, redis]

  storage-service:
    build: ./platform/storage-service
    restart: unless-stopped
    env_file: [.env]
    ports:
      - "8084:8080"
    depends_on: [postgres, redis, minio]

  # ---------- frontends ----------
  admin-portal:
    build: ./platform/admin-portal
    restart: unless-stopped
    ports:
      - "3100:3000"
    depends_on: [gateway]

  web-portal:
    build: ./platform/web-portal
    restart: unless-stopped
    ports:
      - "3101:3000"
    depends_on: [gateway]

volumes:
  pgdata:
  miniodata:
