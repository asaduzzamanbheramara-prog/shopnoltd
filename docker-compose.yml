version: "3.9"

services:
  db:
    image: postgres:15
    container_name: shopnoltd_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopnoltd_backend
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8000:80"
    command: >
      sh -c "php artisan migrate --force &&
             php artisan config:cache &&
             php-fpm"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: shopnoltd_frontend
    restart: always
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=${API_URL}
      - REACT_APP_APP_NAME=${APP_NAME}
      - REACT_APP_ENV=${APP_ENV}
      - REACT_APP_VERSION=1.0.0
    ports:
      - "3000:80"

volumes:
  db_data:
