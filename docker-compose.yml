version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopnoltd_app
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - db
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_KEY: base64:exampleKeyHere=
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: shopnoltd_db
      DB_USERNAME: shopnouser
      DB_PASSWORD: Asad18081978#
    networks:
      - shopnoltd_net

  db:
    image: postgres:15
    container_name: shopnoltd_db
    restart: always
    environment:
      POSTGRES_DB: shopnoltd_db
      POSTGRES_USER: shopnouser
      POSTGRES_PASSWORD: Asad18081978#
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - shopnoltd_net

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: shopnoltd_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - app
    networks:
      - shopnoltd_net

networks:
  shopnoltd_net:

volumes:
  pgdata:
