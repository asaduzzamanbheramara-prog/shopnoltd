# ========================================
# 1️⃣ Build Stage: Composer dependencies
# ========================================
FROM composer:2 AS vendor

WORKDIR /app

# Copy full Laravel backend
COPY backend/ ./

# Create Laravel expected directories
RUN mkdir -p database/seeders database/factories

# Prevent artisan post-autoload scripts from running (artisan might not exist yet)
ENV COMPOSER_ALLOW_SUPERUSER=1 \
    COMPOSER_NO_INTERACTION=1 \
    COMPOSER_DISABLE_XDEBUG_WARN=1 \
    COMPOSER_DISABLE_POST_AUTLOAD_DUMP=1

# Install PHP dependencies
# If lock file is outdated, update automatically
RUN composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader || \
    composer update --no-dev --prefer-dist --no-interaction --optimize-autoloader

# ========================================
# 2️⃣ Final Stage: PHP-FPM + Nginx
# ========================================
FROM php:8.2-fpm-bullseye

WORKDIR /app

# Install system dependencies
RUN apt-get update && apt-get install -y \
    nginx git unzip libpng-dev libjpeg-dev libfreetype6-dev \
    libonig-dev libxml2-dev zip curl libicu-dev libpq-dev supervisor \
    && docker-php-ext-configure gd --with-freetype --with-jpeg \
    && docker-php-ext-install -j$(nproc) gd mbstring pdo pdo_pgsql xml bcmath intl opcache \
    && apt-get clean && rm -rf /var/lib/apt/lists/*

# Copy backend + vendor dependencies from build stage
COPY --from=vendor /app /app

# Remove default Nginx config and copy custom one
RUN rm -rf /etc/nginx/sites-enabled/default /etc/nginx/conf.d/default.conf
COPY docker/nginx/default.conf /etc/nginx/conf.d/default.conf

# Copy PHP-FPM config
COPY docker/php-fpm.conf /usr/local/etc/php-fpm.d/www.conf

# Copy Supervisor config
COPY docker/supervisord.conf /etc/supervisord.conf

# Create storage/cache dirs & set permissions
RUN mkdir -p storage/framework/{sessions,views,cache} storage/logs bootstrap/cache \
    && chown -R www-data:www-data storage bootstrap/cache \
    && chmod -R 775 storage bootstrap/cache

# Expose port 80
EXPOSE 80

# Start Supervisor (manages PHP-FPM & Nginx)
CMD ["/usr/bin/supervisord", "-n", "-c", "/etc/supervisord.conf"]
