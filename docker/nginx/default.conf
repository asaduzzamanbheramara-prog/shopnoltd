server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Serve static assets efficiently
    location ~* \.(?:jpg|jpeg|png|gif|svg|css|js|ico|woff2?|ttf|eot|otf)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    # Main Laravel route handler
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP scripts to PHP-FPM
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    # Deny access to hidden and sensitive files
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Extra security: block direct PHP access in storage/uploads
    location ~* /(?:storage|uploads)/.*\.php$ {
        deny all;
    }
}
