# ================================
# Stage 0: Composer image
# ================================
FROM composer:2 AS vendor

WORKDIR /app

# Copy application code
COPY backend/ ./

# Ensure required directories exist
RUN mkdir -p database/seeders database/factories

# ================================
# Composer install with robust error handling
# ================================
RUN set -eux; \
    echo "Running composer install..."; \
    if ! composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader; then \
        echo ""; \
        echo "======================================================"; \
        echo "ERROR: composer.lock is out of date with composer.json!"; \
        echo "Missing packages detected:"; \
        echo "  - psr/http-client"; \
        echo "  - psr/http-message"; \
        echo "  - psr/log"; \
        echo "Recommended solution:"; \
        echo "  1) Run 'composer update' locally and commit composer.lock"; \
        echo "  2) Rebuild the Docker image"; \
        echo "======================================================"; \
        echo ""; \
        # Optional: auto-update for dev builds (remove for production)
        composer update --no-dev --prefer-dist --no-interaction --optimize-autoloader || exit 1; \
    fi

# ================================
# Stage 1: Production image
# ================================
FROM php:8.2-fpm-bullseye

WORKDIR /app

# Install PHP extensions
RUN apt-get update && apt-get install -y \
    nginx git unzip zip curl libpng-dev libjpeg-dev libfreetype6-dev \
    libonig-dev libxml2-dev libicu-dev libpq-dev supervisor \
    && docker-php-ext-configure gd --with-freetype --with-jpeg \
    && docker-php-ext-install -j$(nproc) gd mbstring pdo pdo_pgsql xml bcmath intl opcache \
    && apt-get clean && rm -rf /var/lib/apt/lists/*

# Copy application + vendor from previous stage
COPY --from=vendor /app /app

# Copy nginx/supervisor configs (optional)
COPY docker/nginx.conf /etc/nginx/nginx.conf
COPY docker/supervisord.conf /etc/supervisor/conf.d/supervisord.conf

# Expose port for PHP-FPM
EXPOSE 9000

# Start supervisord
CMD ["/usr/bin/supervisord", "-n"]
