# ===============================
# 1️⃣ Base image for PHP-FPM
# ===============================
FROM php:8.2-fpm-bullseye AS app

# Set working directory
WORKDIR /app

# ===============================
# 2️⃣ Install system dependencies
# ===============================
RUN apt-get update && apt-get install -y \
    nginx git unzip libpng-dev libjpeg-dev libfreetype6-dev \
    libonig-dev libxml2-dev zip curl libicu-dev libpq-dev supervisor \
    && docker-php-ext-configure gd --with-freetype --with-jpeg \
    && docker-php-ext-install -j$(nproc) gd mbstring pdo pdo_pgsql xml bcmath intl opcache \
    && apt-get clean && rm -rf /var/lib/apt/lists/*

# Ensure Laravel directories exist
RUN mkdir -p database/seeders database/factories

# ===============================
# 3️⃣ Copy application code
# ===============================
COPY backend/ ./

# ===============================
# 4️⃣ Composer install with robust error handling
# ===============================
# We use a shell command to catch Composer errors, print messages, and optionally fix them.
RUN set -eux; \
    if ! composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader; then \
        echo "========================================"; \
        echo "⚠️ Composer install failed! Lock file may be outdated."; \
        echo "You might need to run 'composer update' locally and commit composer.lock."; \
        echo "Attempting to update composer.lock automatically..."; \
        composer update --no-dev --prefer-dist --no-interaction --optimize-autoloader || { \
            echo "❌ Composer update also failed! Check composer.json and composer.lock."; \
            exit 1; \
        }; \
    fi

# ===============================
# 5️⃣ Expose ports and run PHP-FPM
# ===============================
EXPOSE 9000
CMD ["php-fpm"]
