# ========================================
# 1️⃣ Build Stage: Composer dependencies
# ========================================
FROM composer:2 AS vendor

WORKDIR /app

# Copy backend for context
COPY backend/ ./

# Ensure required directories exist
RUN mkdir -p database/seeders database/factories

# Install PHP dependencies (composer)
# Use `composer update` fallback if install fails due to lock file mismatch
RUN composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader \
    || composer update --no-dev --prefer-dist --no-interaction --optimize-autoloader

# ========================================
# 2️⃣ Final Stage: PHP-FPM + Nginx
# ========================================
FROM php:8.2-fpm-bullseye

# Set working directory
WORKDIR /app

# Install system dependencies
RUN apt-get update && apt-get install -y \
    nginx \
    git \
    unzip \
    libpng-dev \
    libjpeg-dev \
    libfreetype6-dev \
    libonig-dev \
    libxml2-dev \
    zip \
    curl \
    libicu-dev \
    libpq-dev \
    supervisor \
    && docker-php-ext-configure gd --with-freetype --with-jpeg \
    && docker-php-ext-install -j$(nproc) gd mbstring pdo pdo_pgsql xml bcmath intl opcache \
    && apt-get clean \
    && rm -rf /var/lib/apt/lists/*

# Copy the vendor directory from build stage
COPY --from=vendor /app /app

# Create directories for Laravel if they don't exist
RUN mkdir -p database/seeders database/factories

# Copy Nginx configuration (you need to provide your nginx.conf)
# COPY ./docker/nginx/default.conf /etc/nginx/sites-available/default

# Supervisor configuration (optional, if you run queue workers)
# COPY ./docker/supervisor/supervisord.conf /etc/supervisor/conf.d/supervisord.conf

# Expose port 80
EXPOSE 80

# Start supervisord + PHP-FPM + Nginx
CMD ["sh", "-c", "php-fpm -D && nginx -g 'daemon off;'"]
