command=/usr/sbin/php-fpm8.4 --nodaemonize --fpm-config /usr/local/etc/php-fpm.d/www.conf
[supervisord]
nodaemon=true

[program:php-fpm]
command=/usr/local/sbin/php-fpm
autostart=true
autorestart=true

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true

