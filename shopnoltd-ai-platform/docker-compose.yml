version: "3.9"

services:

  ai:

    build: .

    ports:

      - "8000:8000"

    env_file:

      - .env.example

    depends_on:

      - postgres

      - redis

  postgres:

    image: postgres:16

    environment:

      POSTGRES_DB: shopno

      POSTGRES_USER: shopno

      POSTGRES_PASSWORD: shopno

    ports:

      - "5432:5432"

  redis:

    image: redis:7

    ports:

      - "6379:6379"
