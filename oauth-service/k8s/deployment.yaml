apiVersion: apps/v1
kind: Deployment

metadata:
  name: oauth-service
  namespace: oauth

spec:
  replicas: 2

  selector:
    matchLabels:
      app: oauth-service

  template:
    metadata:
      labels:
        app: oauth-service

    spec:

      imagePullSecrets:
      - name: ghcr-secret

      containers:

      - name: oauth-service

        image: ghcr.io/asaduzzamanbheramara-prog/shopnoltd-oauth:latest

        imagePullPolicy: Always

        ports:

        - containerPort: 8001
          name: http

        env:

        - name: PORT
          value: "8001"

        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: oauth-secrets
              key: JWT_SECRET

        readinessProbe:

          httpGet:
            path: /health
            port: 8001

          initialDelaySeconds: 5
          periodSeconds: 10


        livenessProbe:

          httpGet:
            path: /health
            port: 8001

          initialDelaySeconds: 15
          periodSeconds: 20
