# Placeholder ServiceMonitor — only registered when the
# prometheus-operator CRDs are installed in the cluster.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: placeholder
  labels:
    app.kubernetes.io/component: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: monitoring
  endpoints:
    - port: http
      path: /metrics
