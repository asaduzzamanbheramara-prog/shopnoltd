apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oauth-service
  namespace: shopno-identity
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.tls: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - oauth-service.shopnoltd.dpdns.org
      secretName: oauth-service-tls
  rules:
    - host: oauth-service.shopnoltd.dpdns.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: oauth-service
                port:
                  number: 80
