apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: domain-service
  namespace: shopno-platform
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - domain.shopnoltd.dpdns.org
      secretName: domain-service-tls
  rules:
    - host: domain.shopnoltd.dpdns.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: domain-service
                port:
                  number: 80
