apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kobotoolbox
  namespace: shopno-apps
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.tls: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - kobotoolbox.shopnoltd.dpdns.org
      secretName: kobotoolbox-tls
  rules:
    - host: kobotoolbox.shopnoltd.dpdns.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kobotoolbox
                port:
                  number: 80
