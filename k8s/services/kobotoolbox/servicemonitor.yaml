apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kobotoolbox
  namespace: shopno-apps
  labels:
    app.kubernetes.io/name: kobotoolbox
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kobotoolbox
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
