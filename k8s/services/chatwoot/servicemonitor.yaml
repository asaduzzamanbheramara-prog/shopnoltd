apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: chatwoot
  namespace: shopno-apps
  labels:
    app.kubernetes.io/name: chatwoot
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: chatwoot
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
