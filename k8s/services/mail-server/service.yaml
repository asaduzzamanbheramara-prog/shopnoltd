apiVersion: v1
kind: Service
metadata:
  name: mail-server
  namespace: default
  labels:
    app: mail-server
spec:
  selector:
    app: mail-server
  ports:
  - name: smtp
    port: 25
    targetPort: 25
  - name: submission
    port: 587
    targetPort: 587
  - name: imaps
    port: 993
    targetPort: 993
