apiVersion: v1
kind: PersistentVolumeClaim

metadata:
  name: postgres-data
  namespace: shopno-data

  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: shopnoltd
    app.kubernetes.io/component: database

spec:
  accessModes:
    - ReadWriteOnce

  resources:
    requests:
      storage: 10Gi

  storageClassName: standard
