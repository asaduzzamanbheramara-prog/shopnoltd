apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: postgres
  namespace: shopno-data
  labels:
    app.kubernetes.io/name: postgres
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
