apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: shopno-data
data:
  APP_NAME: "postgres"
  APP_PORT: "5432"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  ENV: "production"
  PATH_PREFIX: "/healthz"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo.observability.svc.cluster.local:4317"
  REDIS_HOST: "redis.data.svc.cluster.local"
