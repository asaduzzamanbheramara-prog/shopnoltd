apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-engine
  namespace: shopno-payments
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: billing-engine
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%

  template:
    metadata:
      labels:
        app.kubernetes.io/name: billing-engine

    spec:
      containers:
      - name: billing-engine
        image: ghcr.io/asaduzzamanbheramara-prog/shopnoltd-billing-engine:v6
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 5000

        envFrom:
        - secretRef:
            name: billing-engine-secret

        env:
        - name: OTEL_SERVICE_NAME
          value: billing-engine

        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://otel-collector.observability.svc.cluster.local:4318

        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: http/protobuf

        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"

          limits:
            cpu: "750m"
            memory: "768Mi"

        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 20
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
