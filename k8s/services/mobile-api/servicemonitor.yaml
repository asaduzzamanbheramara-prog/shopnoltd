apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: mobile-api
  namespace: shopno-platform
  labels:
    app.kubernetes.io/name: mobile-api
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: mobile-api
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
