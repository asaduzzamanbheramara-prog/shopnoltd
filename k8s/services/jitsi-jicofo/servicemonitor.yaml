apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: jitsi-jicofo
  namespace: shopno-apps
  labels:
    app.kubernetes.io/name: jitsi-jicofo
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: jitsi-jicofo
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
