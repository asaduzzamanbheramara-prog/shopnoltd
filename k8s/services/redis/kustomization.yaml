apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: shopno-data

resources:
- serviceaccount.yaml
- configmap.yaml
- secret.yaml
- pvc.yaml
- deployment.yaml
- service.yaml
- ingress.yaml
- hpa.yaml
- networkpolicy.yaml
- poddisruptionbudget.yaml
- servicemonitor.yaml

labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/name: redis
- includeSelectors: false
  pairs:
    app.kubernetes.io/part-of: shopnoltd
