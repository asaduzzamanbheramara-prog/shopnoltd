apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: audit-service
  namespace: shopno-platform
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.tls: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - audit-service.shopnoltd.dpdns.org
      secretName: audit-service-tls
  rules:
    - host: audit-service.shopnoltd.dpdns.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: audit-service
                port:
                  number: 80
