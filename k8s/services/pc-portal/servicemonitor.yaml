apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: pc-portal
  namespace: shopno-platform
  labels:
    app.kubernetes.io/name: pc-portal
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: pc-portal
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
