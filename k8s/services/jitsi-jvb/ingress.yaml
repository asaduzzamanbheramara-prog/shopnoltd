apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jitsi-jvb
  namespace: shopno-apps
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.tls: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - jitsi-jvb.shopnoltd.dpdns.org
      secretName: jitsi-jvb-tls
  rules:
    - host: jitsi-jvb.shopnoltd.dpdns.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jitsi-jvb
                port:
                  number: 80
