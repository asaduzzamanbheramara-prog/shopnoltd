apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    # Change this to a real inbox you check — Let's Encrypt sends renewal
    # warnings here if a cert is about to expire and hasn't auto-renewed.
    # It doesn't need to be public-facing.
    email: admin@shopnoltd.dpdns.org
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
