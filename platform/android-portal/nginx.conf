server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location = /healthz { return 200 "ok"; add_header Content-Type text/plain; }

  location /downloads/ {
    add_header Content-Disposition "attachment";
    autoindex on;
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
