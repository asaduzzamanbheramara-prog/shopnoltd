client_body_temp_path /tmp/client_temp;
proxy_temp_path       /tmp/proxy_temp;
fastcgi_temp_path     /tmp/fastcgi_temp;
uwsgi_temp_path       /tmp/uwsgi_temp;
scgi_temp_path        /tmp/scgi_temp;

server {
  listen 3000;
  server_name _;
  root /usr/share/nginx/html;
  location = /healthz { return 200 "ok"; add_header Content-Type text/plain; }

  # api-service: cluster/service health (bare paths, no /v1 prefix)
  location /api/services { proxy_pass http://api-service.shopno-platform.svc.cluster.local:80/services; }
  location /api/cluster  { proxy_pass http://api-service.shopno-platform.svc.cluster.local:80/cluster; }

  # oauth-service: users/tenants/customers/settings
  location /api/users    { proxy_pass http://oauth-service.shopno-identity.svc.cluster.local:80/api/v1/users; }
  location /api/tenants  { proxy_pass http://oauth-service.shopno-identity.svc.cluster.local:80/api/v1/tenants; }
  location /api/customers { proxy_pass http://oauth-service.shopno-identity.svc.cluster.local:80/api/v1/customers; }

  # payment-service: wallets/deposits/withdrawals/transfers/transactions/exchanges/admin
  location /api/admin      { proxy_pass http://billing-engine.shopno-payments.svc.cluster.local:80/api/v1/admin; }
  location /api/wallets    { proxy_pass http://billing-engine.shopno-payments.svc.cluster.local:80/api/v1/wallets; }
  location /api/exchanges  { proxy_pass http://billing-engine.shopno-payments.svc.cluster.local:80/api/v1/exchanges; }
  location /api/transactions { proxy_pass http://billing-engine.shopno-payments.svc.cluster.local:80/api/v1/transactions; }

  # live-service: NOT YET DEPLOYED (only legacy k8s manifests exist, see
  # k8s/legacy/ -- Streams.jsx will fail until this is migrated to
  # k8s/services/live-service/ like the other services).
  location /api/streams  { proxy_pass http://live-service.shopno-comms.svc.cluster.local:80/api/v1/streams; }

  # /plans and /releases have no backend at all yet -- Plans.jsx and
  # AppReleases.jsx will 502 until one exists. See docs/API_GAPS.md.

  location / { try_files $uri $uri/ /index.html; }
}
