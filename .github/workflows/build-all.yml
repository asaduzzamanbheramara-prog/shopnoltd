# CORRECTED: this workflow's matrix pointed at directories like
# apps/api-service, apps/oauth, apps/tenant-router, apps/chat, apps/live --
# none of which exist anywhere in this repository (confirmed: `find . -iname
# apps` returns nothing). The comment in the original file even said
# "Replace context below with the REAL source directory" -- it was a
# template that was never finished, but because it triggered `on: push`,
# every push to main/master/develop was running 10 build jobs that would
# fail on 9 of them.
#
# Disabled here (workflow_dispatch only, so it won't fire on push) rather
# than deleted outright, in case some of this matrix reflects a real
# future plan. Recommend deleting this file entirely once you've confirmed
# docker-build.yml (which only builds services with real source) covers
# what you need.

name: "[DISABLED] Build & Publish Shopnoltd Images (broken apps/* paths)"

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          ###################################################################
          # NONE of these "apps/*" directories exist in the repo yet.
          # Replace context/dockerfile with the REAL source directory
          # before re-enabling, or delete the entries once real source
          # exists (see CORRECTIONS-README.md for current status of each).
          ###################################################################
          - name: api-service
            context: apps/api-service
            dockerfile: Dockerfile
          - name: billing-engine
            context: apps/billing-engine
            dockerfile: Dockerfile
          - name: root-app
            context: apps/root-app
            dockerfile: Dockerfile
          - name: oauth
            context: apps/oauth
            dockerfile: Dockerfile
          - name: tenant-router
            context: apps/tenant-router
            dockerfile: Dockerfile
          - name: freedomain
            context: apps/freedomain
            dockerfile: Dockerfile
          - name: freedomain-ui
            context: apps/freedomain-ui
            dockerfile: Dockerfile
          - name: freedomain-website
            context: apps/freedomain-website
            dockerfile: Dockerfile
          - name: chat
            context: apps/chat
            dockerfile: Dockerfile
          - name: live
            context: apps/live
            dockerfile: Dockerfile

          ###################################################################
          # This one is real and already covered by docker-build.yml
          ###################################################################
          - name: ai
            context: shopnoltd-ai-platform/backend
            dockerfile: Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/shopnoltd-${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=sha
            type=ref,event=branch
            type=ref,event=tag
      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
