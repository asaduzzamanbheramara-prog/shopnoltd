name: Build Live

on:
  push:
    paths:
      - live-service/**
      - .github/workflows/live-build.yml

jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

    - uses: actions/checkout@v4

    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - uses: docker/build-push-action@v6
      with:
        context: ./live-service
        push: true
        tags: ghcr.io/asaduzzamanbheramara-prog/shopnoltd-live:latest
