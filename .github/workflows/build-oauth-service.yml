name: Build OAuth Service

on:
  push:
    branches:
      - main
    paths:
      - "oauth-service/**"

permissions:
  contents: read
  packages: write


jobs:

  build:

    runs-on: ubuntu-latest


    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Login GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}


    - name: Build and Push
      uses: docker/build-push-action@v6
      with:

        context: ./oauth-service

        push: true

        tags: |
          ghcr.io/asaduzzamanbheramara-prog/shopnoltd-oauth:latest
          ghcr.io/asaduzzamanbheramara-prog/shopnoltd-oauth:${{ github.sha }}
