name: Build Shopnoltd KoBoCAT

on:
  workflow_dispatch:

  push:
    branches:
      - main

    paths:
      - "branding/**"
      - ".github/workflows/build-kobocat.yml"

permissions:
  contents: read
  packages: write

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5

        with:

          context: ./branding

          file: ./branding/Dockerfile.overlay.kobocat

          push: true

          tags: |
            ghcr.io/asaduzzamanbheramara-prog/shopnoltd-kobocat:latest
            ghcr.io/asaduzzamanbheramara-prog/shopnoltd-kobocat:${{ github.sha }}

          cache-from: type=gha
          cache-to: type=gha,mode=max
