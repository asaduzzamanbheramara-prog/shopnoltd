name: Build and Push Images

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'branding/**'
      - 'source-code/**'

jobs:
  build-kpi:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./branding/Dockerfile.overlay
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/shopnoltd-kpi:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
