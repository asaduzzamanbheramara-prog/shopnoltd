name: Build branded images
on:
  push:
    branches: [main]
    paths:
      - 'branding/**'
      - 'apps/kobotoolbox/**'
      - 'apps/chatwoot/**'
      - 'apps/owncast/**'
env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/shopnoltd
jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [kobotoolbox, kobocat, chatwoot, jitsi-web, owncast, onlyoffice, gitea, nextcloud, code-server, n8n]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build & push branded image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: branding/Dockerfile.overlay
          build-args: BASE_SERVICE=${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ghcr.io/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
