name: Build and Push Shopnoltd Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: shopnoltd

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend
            context: .
            dockerfile: Dockerfile
            tag: latest

          - name: api-service
            context: ./ai-platform/backend
            dockerfile: ./ai-platform/backend/Dockerfile
            tag: v4

          - name: ai
            context: ./ai-platform
            dockerfile: ./ai-platform/Dockerfile
            tag: latest

          - name: billing-engine
            context: ./billing-engine
            dockerfile: ./billing-engine/Dockerfile
            tag: v6

          - name: oauth
            context: ./oauth-service
            dockerfile: ./oauth-service/Dockerfile
            tag: v1

          - name: live
            context: ./live-service
            dockerfile: ./live-service/Dockerfile
            tag: v1

          # --- freedomain-ui / freedomain-website: DISABLED ---
          # No source folder exists at ./ui or ./ui/admin (confirmed: `ls ui/`
          # -> "No such file or directory"). A `find` hit ./archive/ui, which
          # MAY be the real source that got moved/archived - unconfirmed.
          # Re-enable these two matrix entries once you've verified whether
          # ./archive/ui is genuinely the buildable source (and if so, move
          # it back out of archive/ rather than building straight from
          # there), or point at wherever the real source actually lives.
          #
          # - name: freedomain-ui
          #   context: ./ui
          #   dockerfile: ./ui/Dockerfile
          #   tag: v1
          #
          # - name: freedomain-website
          #   context: ./ui/admin
          #   dockerfile: ./ui/admin/Dockerfile
          #   tag: v1

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/shopnoltd-${{ matrix.name }}:${{ matrix.tag }}
            ghcr.io/${{ github.repository_owner }}/shopnoltd-${{ matrix.name }}:latest
            ghcr.io/${{ github.repository_owner }}/shopnoltd-${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
