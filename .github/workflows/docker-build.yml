          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/shopnoltd-live:latest
            ghcr.io/${{ github.repository_owner }}/shopnoltd-live:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Tenant Router (backend)
  tenant-router-build:
    name: Build Tenant Router
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
