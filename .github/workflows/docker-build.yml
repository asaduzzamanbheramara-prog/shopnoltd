name: Build Shopnoltd Docker Images

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write


jobs:

  api-build:

    name: Build API

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Login GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}


    - name: Build API Image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags:
          |
          ghcr.io/${{ github.repository_owner }}/shopnoltd-api:latest
          ghcr.io/${{ github.repository_owner }}/shopnoltd-api:${{ github.sha }}



  ai-build:

    name: Build Shopnoltd AI Platform

    runs-on: ubuntu-latest


    steps:


    - name: Checkout
      uses: actions/checkout@v4


    - name: Login GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}


    - name: Build AI Image
      uses: docker/build-push-action@v6
      with:

        context: ./shopnoltd-ai-platform

        file: ./shopnoltd-ai-platform/Dockerfile

        push: true

        tags:
          |
          ghcr.io/${{ github.repository_owner }}/shopnoltd-ai:latest
          ghcr.io/${{ github.repository_owner }}/shopnoltd-ai:${{ github.sha }}
