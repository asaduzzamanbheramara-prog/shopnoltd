name: Build and Push Docker Images to GHCR

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:

  # ============================================================================
  # FRONTEND SERVICES
  # ============================================================================

  # Root app frontend (Python Uvicorn + app_platform API)
  frontend-build:
    name: Build Frontend (root-app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/shopnoltd-frontend:latest
            ghcr.io/${{ github.repository_owner }}/shopnoltd-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Freedomain UI (React/Vue app)
  freedomain-ui-build:
    name: Build Freedomain UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./ui
          file: ./ui/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/shopnoltd-freedomain-ui:v1
            ghcr.io/${{ github.repository_owner }}/shopnoltd-freedomain-ui:latest
            ghcr.io/${{ github.repository_owner }}/shopnoltd-freedomain-ui:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Freedomain Website / Admin UI
  freedomain-website-build:
    name: Build Freedomain Website (Admin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./ui/admin
          file: ./ui/admin/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/shopnoltd-freedomain-website:v1
            ghcr.io/${{ github.repository_owner }}/shopnoltd-freedomain-website:latest
            ghcr.io/${{ github.repository_owner }}/shopnoltd-freedomain-website:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # BACKEND SERVICES (All from shopnoltd-ai-platform/backend)
  # ============================================================================

  # API Service
  api-service-build:
    name: Build API Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./shopnoltd-ai-platform/backend
          file: ./shopnoltd-ai-platform/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/shopnoltd-api-service:v4
            ghcr.io/${{ github.repository_owner }}/shopnoltd-api-service:latest
            ghcr.io/${{ github.repository_owner }}/shopnoltd-api-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Billing Engine (backend with different CMD/entrypoint)
  billing-engine-build:
    name: Build Billing Engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
