            ghcr.io/${{ github.repository_owner }}/shopnoltd-tenant-router:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # LEGACY PYTHON API (from root Dockerfile + app_platform)
  # ============================================================================

  # Legacy API (for deployment-api.yaml, kept for compatibility)
  api-legacy-build:
    name: Build API (legacy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/shopnoltd-api:latest
            ghcr.io/${{ github.repository_owner }}/shopnoltd-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # AI PLATFORM
  # ============================================================================

  ai-build:
    name: Build AI Platform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
