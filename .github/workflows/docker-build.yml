name: Build and Push Shopnoltd Images

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: shopnoltd

jobs:

  build:

    runs-on: ubuntu-latest

    strategy:

      fail-fast: false

      matrix:

        include:

          - name: frontend
            context: .
            dockerfile: Dockerfile
            tag: latest

          - name: api-service
            context: ./shopnoltd-ai-platform/backend
            dockerfile: ./shopnoltd-ai-platform/backend/Dockerfile
            tag: v4

          - name: ai
            context: ./shopnoltd-ai-platform
            dockerfile: ./shopnoltd-ai-platform/Dockerfile
            tag: latest

          - name: freedomain-ui
            context: ./ui
            dockerfile: ./ui/Dockerfile
            tag: v1

          - name: freedomain-website
            context: ./ui/admin
            dockerfile: ./ui/admin/Dockerfile
            tag: v1

          - name: billing-engine
            context: ./billing-engine
            dockerfile: ./billing-engine/Dockerfile
            tag: v6

          - name: oauth
            context: ./services/oauth-service
            dockerfile: ./services/oauth-service/Dockerfile
            tag: v1

          - name: live
            context: ./services/live
            dockerfile: ./services/live/Dockerfile
            tag: v1

    steps:

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3

        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push

        uses: docker/build-push-action@v6

        with:

          context: ${{ matrix.context }}

          file: ${{ matrix.dockerfile }}

          push: true

          tags: |

            ghcr.io/${{ github.repository_owner }}/shopnoltd-${{ matrix.name }}:${{ matrix.tag }}

            ghcr.io/${{ github.repository_owner }}/shopnoltd-${{ matrix.name }}:latest

            ghcr.io/${{ github.repository_owner }}/shopnoltd-${{ matrix.name }}:${{ github.sha }}

          cache-from: type=gha

          cache-to: type=gha,mode=max
