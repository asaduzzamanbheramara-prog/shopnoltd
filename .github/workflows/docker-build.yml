            ghcr.io/${{ github.repository_owner }}/shopnoltd-billing-engine:latest
            ghcr.io/${{ github.repository_owner }}/shopnoltd-billing-engine:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # OAuth Service (backend)
  oauth-build:
    name: Build OAuth Service
    runs-on: ubuntu-latest
    steps:
