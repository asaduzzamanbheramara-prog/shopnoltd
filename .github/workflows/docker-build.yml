      - uses: docker/build-push-action@v6
        with:
          context: ./shopnoltd-ai-platform/backend
          file: ./shopnoltd-ai-platform/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/shopnoltd-oauth:v1
            ghcr.io/${{ github.repository_owner }}/shopnoltd-oauth:latest
            ghcr.io/${{ github.repository_owner }}/shopnoltd-oauth:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Chat Service (backend)
  chat-build:
    name: Build Chat Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./shopnoltd-ai-platform/backend
          file: ./shopnoltd-ai-platform/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/shopnoltd-chat:latest
            ghcr.io/${{ github.repository_owner }}/shopnoltd-chat:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Live Service (backend)
  live-build:
    name: Build Live Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
