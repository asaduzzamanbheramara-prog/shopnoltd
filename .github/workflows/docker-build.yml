name: Build and Push ALL Docker Images to GHCR

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:

  # ============================================================================
  # FRONTEND & UI SERVICES
  # ============================================================================

  frontend-build:
    name: Build Frontend (root-app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/shopnoltd-frontend:latest
            ghcr.io/${{ github.repository_owner }}/shopnoltd-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  freedomain-ui-build:
    name: Build Freedomain UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./ui
          file: ./ui/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/shopnoltd-freedomain-ui:v1
            ghcr.io/${{ github.repository_owner }}/shopnoltd-freedomain-ui:latest
            ghcr.io/${{ github.repository_owner }}/shopnoltd-freedomain-ui:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  freedomain-website-build:
